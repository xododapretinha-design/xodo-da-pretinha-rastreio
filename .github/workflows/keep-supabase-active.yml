name: Keep Supabase Active

on:
  schedule:
    # Executa a cada 3 dias às 06:00 UTC
    - cron: '0 6 */3 * *'
  workflow_dispatch: # Permite execução manual pela interface do GitHub

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Realizar consulta no Banco de Dados do Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Erro: Variáveis SUPABASE_URL ou SUPABASE_ANON_KEY não configuradas nos Secrets do GitHub."
            exit 1
          fi
          echo "Iniciando consulta para manter o banco ativo..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${SUPABASE_URL}/rest/v1/orders?select=tracking_code&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          
          echo "Resposta do Supabase HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 204 ]; then
            echo "Sucesso: Banco de dados consultado e ativo!"
          else
            echo "Erro ao conectar ao Supabase. Código retornado: $HTTP_STATUS"
            exit 1
          fi
